<!DOCTYPE html>
<html>
<head>
    <title>Introduction to Web Programming</title>

    <style>
        body {
            font-family: Arial;
            margin: 0px;
            padding: 20px;
            background: linear-gradient(320deg,#eb92be,#ffef78,#63c9b4);
            background-repeat: no-repeat;
        }

        /* Header */
        .header {
            background: #dbe7ff;
            padding: 20px;
            text-align: center;
            border: 3px solid;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .header h1 {
            margin: 0;
        }

        /* Navigation */
        .nav {
            background: #d4f5d4;
            padding: 10px;
            text-align: center;
            border-bottom: 2px solid #999;
            border: 3px solid;
            border-radius: 10px;
            margin-bottom: 10px;
            
            
        }

        .nav a {
            display: inline-block;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
            color: black;
            padding: 7px 10px;
            transition: 0.3s;
        }

        /* Layout */
        .main {
            display: flex;
            padding: 0;
            gap: 20px;
        }

        .left {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .right {
            flex: 1;
            background: hsl(45, 84%, 90%);
            padding: 15px;
            border-radius: 10px;
            border: 3px solid;
            margin-bottom: 0;
        }

        .box {
            flex: 1;
            background: #e8e4ff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 3px solid;
        }
        #box1{
            margin-bottom: 10px;
        }
        #box2{
            background-color: hsl(195, 87%, 88%);
            margin-bottom: -0.7px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        table, th, td {
            border: 1px solid #aaa;
            padding: 10px;
        }

        th {
            background: #f2dede;
        }

        /* Image + text */
        .flexbox {
            display: flex;
            align-items: center;
        }

        .flexbox img {
            width: 300px;
            margin-right: 20px;
        }

        /* Footer */
        footer {
            text-align: center;
            background: #cfe2ff;
            padding: 15px;
            margin-top: -5px;
            border: 3px solid;
            border-radius: 10px;
            margin-top: 10px;
        }
        .nav a:hover{
            background-color: hsl(219, 81%, 56%);
            color: white;
            border-radius: 10px;
        }
        .right a{
            text-decoration: none;
        }
        @keyframes glow{
            50%{box-shadow: 0px 0px 50px red}
        }
        .header:hover,.nav:hover,#box1:hover,#box2:hover,.right:hover,footer:hover{
            animation-name: glow;
            animation-duration: 2s;
        }
    </style>

</head>

<body>
